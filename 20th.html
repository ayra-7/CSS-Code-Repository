<!--                  Flexbox                      -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        .cont{
            height: 80vh;
            border: 2px solid red;
            margin: 20px;
            display: flex;
            /* justify-content: center; */
            align-items: center;
            flex-direction: column;
            flex-wrap: wrap-reverse;
            align-content: flex-start;
            /* No justify items in flexbox */
            flex-flow: row wrap;
            gap: 30px;
            row-gap: 5px;
            column-gap: 10px;
            gap: 40px 10px;
        }

        .item{
            height:62px;
            width: 62px;
            background-color: blueviolet;
            border: 2px solid black;
            margin: 4px;
        }

        /* The more the order, the further the item */
        .order-1{
         order: 2;   
        }

        .order-2{
         order: 1;   
        }

        .order-3{
         order: 0;   
        }

        .cont1{
            height: 80vh;
            border: 2px solid green;
            margin: 20px;
            display: flex;
        }
        
        .it{
            /* flex-grow: 1; */
            height:42px;
            width: 42px;
            background-color: rgb(87, 198, 246);
            border: 2px solid black;
            margin: 4px;
        }
        
        .it1{
            /* flex-grow: 5; */
            flex-shrink: 2;
            align-self: center;
        }

    </style>
</head>
<body>
    <main>
        <div class="cont">
            <div class="item">1</div>
            <div class="item">2</div>
            <div class="item">3</div>
            <div class="item order-1">4</div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item order-2">10</div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item order-3">66</div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
        </div>
        <div class="cont1">
            <div class="it it1"></div>
            <div class="it"></div>
            <div class="it"></div>
            <div class="it"></div>
            <div class="it"></div>
            <div class="it"></div>
            <div class="it"></div>
        </div>
    </main>
</body>
</html>
