<!--          Position Property           -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Property</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }

        .parent{
            border: 2px solid red;
            margin: 43px;
            padding: 34px;
            position: absolute;
            /* transform: translate(0); */
            /* filter: invert(0); */
            /* perspective: 0em; */

        }

        .box{
            height: 933px;
            width: 80vw;
            padding: 3px;
            margin: 3px;
            border: 2px solid black;
        }

        .box1{
            background-color: lightblue;
            /*
            position: absolute;
            top: -30px;
            left: 40px;
            */
            /* position: relative; */
            /* z-index: 1; */
            position: sticky;
            top: 0px;
            height: 100px;
        }

        .box2{
            background-color: lightcyan;
            position: relative;
            bottom: 25px;
            left: 30px;
        }

        .box3{
            background-color: lightgoldenrodyellow;
            position: fixed;
            height: 100px;
            bottom: 0px;
            right: 0px;
        }

        .box4{
            background-color: lightskyblue;
        }
        
    </style>
</head>
<body>
    <div class="parent">
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
        <div class="box box4"></div>
    </div>
</body>
</html>
