<!--               Transforms              -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transforms</title>
    <style>

        .container{
            width: 100vw;
            height: 150vh;
            border: 2px solid purple;
        }
        
        .box{
            height: 50px;
            width: 50px;
            border: 2px solid black;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 50px;
            
        }
        
        .box1{
            background-color: aliceblue;
            transform: rotate(40deg);
            transform: rotate(0.25turn);
            transform: rotateX(40deg);
        }
        
        .box2{
            background-color: rgb(133, 210, 201);
            transform: scale(1.6);
        }
        
        .box3{
            background-color: rgb(230, 156, 241);
            transform: skew(35deg);
        }
        
        .box4{
            background-color: rgb(133, 210, 173);
            transform: translate(100px);
            transform: translate(100px) rotate(40deg);
        }
        
        .box5{
            background-color: rgb(190, 236, 158);
            transform-origin: 0% -50%;
        }



    </style>
</head>
<body>
    <div class="container">
        <div class="box box1">Rotate</div>
        <div class="box box2">Scale</div>
        <div class="box box3">Skew</div>
        <div class="box box4">Tanslate</div>
        <div class="box box5">Trans Origin</div>
    </div>
</body>
</html>
