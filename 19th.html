<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Designing Excercise</title>
    <style>

        *{
            margin: 0;
            padding: 0;
        }
        
        header{
            position: sticky;
            top: 0;
        }

        div.navigation{
            background-color: pink;
            height: 25px;
        }

        ul li{
            list-style: none;
            display: inline;
            margin: 10px;
            padding: 20px;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
        
        ul li a{
            text-decoration: none;
            color: black;
        }

        div.sections{
            background-color: green;
            height: 600px;
            width: 95vw;
            margin: 20px 30px;
            text-align: center;
        }
        
        div.section1{
            background-color: peachpuff;
            height: 60%;
            width: 30%;
            display: inline-block;
            margin: 110px;
        }

        div.section2{
            background-color: rgb(15, 163, 208);
            height: 60%;
            width: 30%;
            display: inline-block;
            margin: 110px;
        }

        .cont{
            border: 2px solid black;
            border-radius: 20px;
            padding: 20px;
            height: 60px;
            width: 70vw;
            margin: auto;
        }

        img{
            border-radius: 500px;
            position: fixed;
            bottom: 0;
            right: 0;
        }

        .foot{
            background-color: rgb(184, 74, 93);
            height: 25px;
            margin-top: 20px;
        }
    </style>

</head>
<body>
    <header>
        <div class="navigation">
            <nav>
                <ul>
                    <li><a href="/">Home</a></li>
                    <li><a href="/">About</a></li>
                    <li><a href="/">Library</a></li>
                    <li><a href="/">Placements</a></li>
                    <li><a href="/">Contacts</a></li>
                </ul>
            </nav>
        </div>
    </header>
        <main></main>
        <div class="sections">
            <div class="section1">
    
            </div>
            <div class="section2">
    
            </div>
        </div>
        <div class="cont">

        <div class="logo">
            <img src="https://images.pexels.com/photos/459225/pexels-photo-459225.jpeg?cs=srgb&dl=daylight-environment-forest-459225.jpg&fm=jpg" alt="Logo" height="50px" width="50px">
