<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        *{
            margin: 0;
            padding: 0;
        }

        .box{
            border: 2px solid black;
            display: inline;
            width: 100px;
        }

        .cont{
            border: 2px solid black;
            display: inline-block;
            width: 200px;
            margin: 34px;
            padding: 20px;
        }

        .box1{
            /* display: none; */
            /* visibility: hidden; */
            display: inline-flex;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="box box1">I am a box.</div>
    <div class="box">And also a good box.</div>

    <span>I am a good </span>
    <span>girl.</span>

    <div class="cont">I am a box.</div>
    <div class="cont">And also a good box.</div>
</body>
</html>
