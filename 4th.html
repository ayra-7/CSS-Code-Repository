
<!--                CSS Box Features                -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .box{
        background-color: aquamarine;
    }
    .box1{
        color: red;
        padding: 10px;
        margin: 25px;
        border: 2px solid blue;
        height: 200px;
        box-sizing: border-box;  /*element height= content height + border height + padding height*/
    }
    .box2{
        color: yellow;
        padding: 10px;
        margin: 25px;
        border: 2px solid black;
        height: 200px;
    }
    </style>
</head>
<body>
    <div class="box box1">
        Hello! Classes box and box1.
    </div>
    <div class="box box2">
        Hello! Classes box and box2.

    </div>
</body>
</html>
