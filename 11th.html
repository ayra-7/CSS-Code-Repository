<!DOCTYPE html>
<html lang="en">
<head>

    <title>CSS Lists</title>
    <style>

        nav ul li{
            border: 2px solid black;
            list-style: lower-alpha;
            background-color: rgba(217, 239, 247, 0.89);
            /* list-style-position: inside; */

            list-style: "💥" inside /* url("BTS-Logo.png") */ ;
        }

</head>

        </ul>

    </nav>
